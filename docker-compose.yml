version: "3.8"

services:
  db:
    image: postgres:15
    container_name: inventory-db
    restart: always
    environment:
      POSTGRES_USER: linh
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: inventory_wqev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: inventory-backend
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://linh:123456@db:5432/inventory_wqev
      JWT_SECRET: dev_secret
      FRONTEND_URL: http://localhost:5173
    command: sh -c "npx prisma migrate deploy&& npm run seed && npm start"

  frontend:
    build: ./frontend
    container_name: inventory-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - backend
    command: sh -c "npm run dev -- --host"

volumes:
  postgres_data: