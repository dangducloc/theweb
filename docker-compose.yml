version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    # ✅ Healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # ✅ Resource limits
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend
    restart: unless-stopped
    # ✅ depends_on
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET:   ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV:     production
      PORT:         3000
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.75"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ✅ Pass VITE env at build time (Vite bakes into the bundle)
        VITE_API_URL: ${VITE_API_URL}
    container_name: inventory-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

volumes:
  postgres_data:
    driver: local

networks:
  internal:
    driver: bridge