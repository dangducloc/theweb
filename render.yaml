#        fromService:
#          name: inventory-backend
#          type: web
#          property: hostport
#    routes:
#      # SPA fallback — all routes serve index.html (React Router)
#      - type: rewrite
#        source: /*
#        destination: /index.html


# =============================================================
#  RESOURCE MAPPING SUMMARY
# =============================================================
#
#  docker-compose               render.yaml
#  ─────────────────────────    ──────────────────────────────
#  db (postgres:15-alpine)   →  databases[].inventory-db (managed)
#  backend memory: 512m      →  plan: starter (~512MB)
#  backend cpus: 0.75        →  plan: starter (0.5 vCPU)
#  frontend memory: 128m     →  plan: starter or free
#  volumes: postgres_data    →  Managed by Render DB (automatic)
#  networks: internal        →  Render private network (automatic)
#  healthcheck (backend)     →  healthCheckPath: /health
#  healthcheck (db)          →  Managed internally by Render
#  restart: unless-stopped   →  Render auto-restarts on crash
#  depends_on: db healthy    →  Render starts DB first; use retry
#                               logic in backend startup code
#
# =============================================================
#
#  DEPLOYMENT STEPS:
#  1. Push this file as `render.yaml` to root of your Git repo
#  2. Go to https://dashboard.render.com → New → Blueprint
#  3. Connect your Git repo
#  4. Set SECRET env vars in dashboard (JWT_SECRET, POSTGRES_USER, etc.)
#     OR use Render's Secret Files / Environment Groups
#  5. Deploy!
#
# =============================================================