# =============================================================
#  render.yaml  —  Render Blueprint (Infrastructure as Code)
#  Converted from docker-compose.yml (Inventory App)
#  Docs: https://render.com/docs/blueprint-spec
# =============================================================

databases:
  # ----------------------------------------------------------------
  # PostgreSQL — Render Managed Database
  # Replaces the `db` service in docker-compose.
  # Render handles HA, backups, TLS, and healthchecks internally.
  # ----------------------------------------------------------------
  - name: inventory-db
    databaseName: ${POSTGRES_DB}       # maps to POSTGRES_DB env var
    user: ${POSTGRES_USER}             # maps to POSTGRES_USER env var
    plan: free                         # Options: free | starter | standard | plus | pro
    #
    # ⚠️  POSTGRES_PASSWORD is auto-generated by Render and injected
    #     into services via the `fromDatabase` block below.
    #     You do NOT set it manually here.
    #
    # Region must match your web services for private networking:
    region: singapore                  # Closest to Vietnam — change if needed
    #                                  # Other options: oregon, frankfurt, ohio, virginia


services:
  # ----------------------------------------------------------------
  # BACKEND — Node.js API
  # Replaces the `backend` service in docker-compose.
  # ----------------------------------------------------------------
  - type: web
    name: inventory-backend
    runtime: docker                    # Use Dockerfile in ./backend/
    region: singapore                  # Must match DB region for private network
    plan: starter                      # free (512MB RAM, 0.1 CPU) | starter (512MB, 0.5 CPU)
    #                                  # standard (2GB, 1 CPU) | etc.

    # --- Build ---
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend           # maps to: build.context: ./backend

    # --- Networking ---
    # Render exposes this port publicly via HTTPS automatically.
    # No need to map host:container like Docker.
    port: 3000                         # maps to ports: "3000:3000"

    # --- Health Check ---
    # Render will poll this path to determine if the service is healthy.
    # Maps to: healthcheck test wget http://localhost:3000/health
    healthCheckPath: /health

    # --- Environment Variables ---
    envVars:
      # Database URL — pulled from the managed DB above (private network)
      # Render injects the internal connection string automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db           # Must match databases[].name above
          property: connectionString   # Render provides the full postgresql:// URL

      # JWT config
      - key: JWT_SECRET
        sync: false                    # Secret — set manually in Render dashboard
                                       # (sync: false = not committed to repo)
      - key: JWT_EXPIRES_IN
        value: 7d                      # maps to JWT_EXPIRES_IN:-7d default

      # CORS — tell backend which frontend URL is allowed
      - key: FRONTEND_URL
        fromService:                   # Dynamically reference the frontend service URL
          name: inventory-frontend
          type: web
          property: host               # Injects the public hostname of frontend

      # Runtime
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

    # --- Auto Deploy ---
    # Render auto-deploys on git push to the configured branch.
    # Set branch in Render dashboard or add here:
    # branch: main


  # ----------------------------------------------------------------
  # FRONTEND — Vite/React Static Site (served by Nginx via Docker)
  # Replaces the `frontend` service in docker-compose.
  #
  # Option A (below): Use `type: web` with Docker (Nginx container)
  # Option B:         Use `type: static` if you export static files
  #                   (faster, cheaper — see commented block at bottom)
  # ----------------------------------------------------------------
  - type: web
    name: inventory-frontend
    runtime: docker
    region: singapore

    plan: starter                      # 128MB RAM is enough for Nginx

    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend

    port: 80                           # Nginx listens on 80; Render wraps with HTTPS

    # --- Build-time environment variables ---
    # Vite BAKES these into the JS bundle at build time (not runtime).
    # This maps to: args: VITE_API_URL: ${VITE_API_URL}
    envVars:
      - key: VITE_API_URL
        fromService:                   # Dynamically point to the backend service
          name: inventory-backend
          type: web
          property: hostport           # Returns https://inventory-backend.onrender.com


# =============================================================
#  HOW PRIVATE NETWORKING WORKS ON RENDER
# =============================================================
#
#  Docker Compose used:  networks: internal (bridge)
#
#  Render uses a built-in private network between services
#  in the SAME REGION automatically. No extra config needed.
#
#  - Backend  →  DB:      via DATABASE_URL (fromDatabase)
#                         Internal host looks like:
#                         dpg-xxxx.singapore-postgres.render.com
#                         (NOT exposed publicly)
#
#  - Frontend →  Backend: via VITE_API_URL (fromService/hostport)
#                         This is the PUBLIC https URL because
#                         Vite bakes it into the browser bundle.
#
# =============================================================


# =============================================================
#  OPTION B — Frontend as Render Static Site (Alternative)
#  Uncomment this block and REMOVE the frontend web service above
#  if your Dockerfile just runs `vite build` and outputs /dist
# =============================================================
#
#  - type: static
#    name: inventory-frontend
#    region: singapore
#    buildCommand: cd frontend && npm install && npm run build
#    staticPublishPath: ./frontend/dist
#    envVars:
